name: Daily Reels Report

on:
  schedule:
    # 03:45 UTC = 06:45 по Москве (cron в UTC). Запас взят с учётом того,
    # что GitHub задерживает cron-запуски до 40-45 минут (наблюдалось
    # 13.07.2026), чтобы отчёт был готов к 07:30 МСК.
    - cron: "45 3 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "agent/**"
      - ".github/workflows/daily-reels-report.yml"

permissions:
  contents: write

concurrency:
  group: reels-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect reels and build report
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python agent/collect_reels.py

      - name: Commit report and history
        run: |
          git config user.name "reels-report-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports data
          if git commit -m "📊 Reels report $(date -u +%F)"; then
            # Ветка могла уйти вперёд, пока шёл сбор — подтягиваем и пушим.
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          else
            echo "Nothing to commit"
          fi
