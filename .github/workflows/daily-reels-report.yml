name: Daily Reels Report

on:
  schedule:
    # 04:30 UTC = 07:30 по Москве. Время в cron указывается в UTC.
    - cron: "30 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: reels-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect reels and build report
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python agent/collect_reels.py

      - name: Commit report and history
        run: |
          git config user.name "reels-report-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports data
          git commit -m "📊 Reels report $(date -u +%F)" || echo "Nothing to commit"
          git push
